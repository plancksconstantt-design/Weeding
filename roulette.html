<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette</title>
    <link rel="stylesheet" href="styles/roulette.css">
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="/js/roulette.js"></script>
</head>
<body>
    <main>
    <div class="roulette">
        
        <img src="img/details_img.png" alt="details_img" class="details_img">
        <img src="img/Roulette_img/RouletteVector.png" alt="rouletteVector" class="rouletteVector">
        <div class="text-CormorantSemiBold headline">РУЛЕТКА</div>
        <div class="text-CormorantItalic text1">Нажмите на кнопку “Узнать подарок”, чтобы получить информацию о подарке, который мы ждем от Вас на нашу свадьбу.</div>

        <div class="presentCard-div">
            <img src="img/Roulette_img/presentCard.png" alt="presentCard-img" class="presentCard-img">
            <div class="presentCard-text text-CormorantSemiBold">Ваш подарок будет показан тут</div>
            <img src="img/Roulette_img/present.png" alt="present" class="present">
        </div>

        <!-- кнопки -->
        <a href="/index.html">
            <button class="btn-back text-CormorantSemiBold whiteButton"> Назад</button>
        </a>

       
        <button class="btn-send text-CormorantSemiBold redButton">Узнать подарок</button>
        
        
    </div>
    </main>
</body>
</html>
